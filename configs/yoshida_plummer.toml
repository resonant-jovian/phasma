# Yoshida Plummer — 4th-order symplectic splitting
#
# Uses the Yoshida 4th-order splitting scheme (7 sub-steps per timestep)
# for higher accuracy than Strang splitting (2nd-order, 3 sub-steps).
# Each timestep is ~3.5x more expensive but the error decreases as O(dt^4)
# instead of O(dt^2), allowing much larger timesteps for the same accuracy.
#
# Good for long-duration equilibrium evolution where energy conservation
# is critical.

[model]
type = "plummer"
total_mass = 1.0
scale_radius = 1.0

[domain]
spatial_extent = 10.0
velocity_extent = 3.0
spatial_resolution = 16
velocity_resolution = 16
boundary = "isolated|truncated"
coordinates = "cartesian"
gravitational_constant = 1.0

[solver]
representation = "uniform"
poisson = "fft_isolated"
advection = "semi_lagrangian"
integrator = "yoshida"

[time]
t_final = 50.0
dt_mode = "adaptive"
cfl_factor = 0.5

[output]
directory = "output/yoshida_plummer"
prefix = "run"
snapshot_interval = 2.0

[exit]
energy_drift_tolerance = 1e-3
mass_drift_tolerance = 0.1
