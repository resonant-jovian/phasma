# Balanced — Mid-range Plummer with Yoshida 4th-order
#
# 20^3 × 20^3 uniform grid.  Phase-space array ≈ 512 MB, peak ~1 GB.
# Yoshida splitting gives 4th-order accuracy — significantly better
# conservation than Strang at the cost of 3.5× more sub-steps per dt.
#
# Good for studying energy/momentum conservation and comparing
# integrator quality.  Fits easily in 8 GB RAM.

[model]
type = "plummer"
total_mass = 1.0
scale_radius = 1.0

[domain]
spatial_extent = 10.0
velocity_extent = 3.0
spatial_resolution = 20
velocity_resolution = 20
boundary = "periodic|truncated"
coordinates = "cartesian"
gravitational_constant = 1.0

[solver]
representation = "uniform"
poisson = "fft_periodic"
advection = "semi_lagrangian"
integrator = "yoshida"            # 4th-order Yoshida (7 sub-steps)

[time]
t_final = 15.0
dt_mode = "adaptive"
cfl_factor = 0.35

[output]
directory = "output/balanced"
prefix = "run"
snapshot_interval = 1.0

[exit]
energy_drift_tolerance = 0.5
mass_drift_tolerance = 0.1

[performance]
memory_budget_gb = 4.0
