# Plummer Spherical Harmonics — Legendre decomposition Poisson solver
#
# Decomposes the density field into spherical harmonics Y_lm
# and solves the radial ODE for each (l,m) mode.
# Natural for spherical systems where few l-modes dominate.
# l_max=8 captures monopole through octupole and beyond.
# Compare F9 Poisson Detail against fft_isolated.

[model]
type = "plummer"
total_mass = 1.0
scale_radius = 1.0

[domain]
spatial_extent = 10.0
velocity_extent = 3.0
spatial_resolution = 16
velocity_resolution = 16
boundary = "isolated|truncated"
coordinates = "cartesian"
gravitational_constant = 1.0

[solver]
representation = "uniform"
poisson = "spherical_harmonics"
advection = "semi_lagrangian"
integrator = "strang"

[time]
t_final = 200.0
dt_mode = "adaptive"
cfl_factor = 0.01

[output]
directory = "output/plummer_spherical"
prefix = "run"
snapshot_interval = 0.5

[exit]
energy_drift_tolerance = 100.0
mass_drift_tolerance = 0.5
