# Isochrone (Hénon 1960) — Analytic equilibrium model
#
# 16^3 x 16^3 uniform grid.
# Isochrone potential Φ(r) = -GM / (√(b² + r²) + b)
# has an analytic DF f(E) (Hénon 1960 / Binney & Tremaine §4.3).
# All orbital frequencies are analytically known, enabling
# precise phase-space mixing diagnostics.
#
# Watch F7 Profiles for ρ(r) stability.
# Watch F5 Energy for conservation.

[model]
type = "isochrone"
total_mass = 1.0
scale_radius = 1.0

[domain]
spatial_extent = 10.0
velocity_extent = 3.0
spatial_resolution = 16
velocity_resolution = 16
boundary = "isolated|truncated"
coordinates = "cartesian"
gravitational_constant = 1.0

[solver]
representation = "uniform"
poisson = "vgf"
advection = "semi_lagrangian"
integrator = "strang"

[time]
t_final = 100.0
dt_mode = "adaptive"
cfl_factor = 0.01

[output]
directory = "output/isochrone"
prefix = "run"
snapshot_interval = 0.5

[exit]
energy_drift_tolerance = 100.0
mass_drift_tolerance = 0.5
