# Plummer — Instrumented Strang splitting with rank monitoring
#
# 16^3 x 16^3 HT representation with instrumented integrator.
# Records per-step rank diagnostics: singular value spectra,
# effective rank, and compression ratio after each sub-step.
#
# Watch F6 Rank for detailed per-sub-step rank evolution.
# Watch F5 Energy for conservation.

[model]
type = "plummer"
total_mass = 1.0
scale_radius = 1.0

[domain]
spatial_extent = 32.0
velocity_extent = 16.0
spatial_resolution = 16
velocity_resolution = 16
boundary = "isolated|truncated"
coordinates = "cartesian"
gravitational_constant = 1.0

[solver]
representation = "hierarchical_tucker"
poisson = "vgf"
advection = "slar"
integrator = "instrumented_strang"
conservation = "lomac"

[solver.ht]
max_rank = 50
initial_rank = 10
tolerance = 1e-6
rank_adaptation = "tolerance"
dimension_tree = "balanced_xv"

[solver.slar]
reconstruction_order = 3
aca_tolerance = 1e-8
max_aca_iterations = 500
oversampling_factor = 2.0

[solver.lomac]
flux_scheme = "kfvs"
projection_tolerance = 1e-12

[time]
t_final = 10.0
dt_mode = "adaptive"
cfl_factor = 0.01

[output]
directory = "output/plummer_instrumented"
prefix = "run"
snapshot_interval = 0.5

[exit]
energy_drift_tolerance = 100.0
mass_drift_tolerance = 0.5
