# Plummer Tensor Poisson — Braess-Hackbusch exponential-sum Green's function
#
# Low-rank exp-sum approximation
# 1/r ~ sum c_k exp(-alpha_k r^2)
# combined with dense 3D FFT convolution
# for O(N^3 log N) isolated-BC gravity.
# Green's function precomputed on (2N)^3 zero-padded grid.
# ~30 terms for 1e-6 accuracy.
# Compare F9 Poisson Detail against fft_isolated.

[model]
type = "plummer"
total_mass = 1.0
scale_radius = 1.0

[domain]
spatial_extent = 10.0
velocity_extent = 3.0
spatial_resolution = 16
velocity_resolution = 16
boundary = "isolated|truncated"
coordinates = "cartesian"
gravitational_constant = 1.0

[solver]
representation = "uniform"
poisson = "tensor"
advection = "semi_lagrangian"
integrator = "strang"

[solver.exponential_sum]
num_terms = 30
accuracy = 1e-6

[time]
t_final = 200.0
dt_mode = "adaptive"
cfl_factor = 0.01

[output]
directory = "output/plummer_tensor_poisson"
prefix = "run"
snapshot_interval = 0.5

[exit]
energy_drift_tolerance = 100.0
mass_drift_tolerance = 0.5
