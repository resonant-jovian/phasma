# Plummer Yoshida — 4th-order symplectic splitting
#
# 16^3 x 16^3 uniform grid.
# Phase-space ~ 134 MB.
# Yoshida splitting (7 sub-steps) gives O(dt^4) accuracy
# vs Strang's O(dt^2).
# Each timestep costs ~3.5x more
# but energy conservation is much tighter.
# Compare F5 Energy drift against the baseline plummer.toml (Strang).

[model]
type = "plummer"
total_mass = 1.0
scale_radius = 1.0

[domain]
spatial_extent = 10.0
velocity_extent = 3.0
spatial_resolution = 16
velocity_resolution = 16
boundary = "isolated|truncated"
coordinates = "cartesian"
gravitational_constant = 1.0

[solver]
representation = "uniform"
poisson = "fft_isolated"
advection = "semi_lagrangian"
integrator = "yoshida"

[time]
t_final = 200.0
dt_mode = "adaptive"
cfl_factor = 0.01

[output]
directory = "output/plummer_yoshida"
prefix = "run"
snapshot_interval = 0.5

[exit]
energy_drift_tolerance = 100.0
mass_drift_tolerance = 0.5

[performance]
memory_budget_gb = 2.0
