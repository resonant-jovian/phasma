# Tree NFW — Barnes-Hut tree Poisson solver with NFW dark matter halo
#
# Uses the octree-based Barnes-Hut gravity solver with opening angle
# theta=0.5. The tree solver scales as O(N³ log N³) and handles
# isolated boundary conditions naturally without zero-padding.
#
# Combined with an NFW dark matter halo profile for a realistic
# cuspy dark matter distribution.

[model]
type = "nfw"
total_mass = 1.0
scale_radius = 1.0

[model.nfw]
concentration = 10.0
virial_mass = 1.0
velocity_anisotropy = "isotropic"

[domain]
spatial_extent = 10.0
velocity_extent = 3.0
spatial_resolution = 16
velocity_resolution = 16
boundary = "isolated|truncated"
coordinates = "cartesian"
gravitational_constant = 1.0

[solver]
representation = "uniform"
poisson = "tree"
advection = "semi_lagrangian"
integrator = "strang"

[time]
t_final = 20.0
dt_mode = "adaptive"
cfl_factor = 0.3

[output]
directory = "output/tree_nfw"
prefix = "run"
snapshot_interval = 1.0

[exit]
energy_drift_tolerance = 5.0
mass_drift_tolerance = 0.5
