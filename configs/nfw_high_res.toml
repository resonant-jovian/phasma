# NFW High-Res — Navarro-Frenk-White c=10 halo at higher resolution
#
# 32^3 × 16^3 uniform grid.  Phase-space: 32^3 × 16^3 × 8 ≈ 1.07 GB.
# NFW profiles have a central cusp rho ~ 1/r, which requires higher
# spatial resolution to avoid artificial core formation. Yoshida 4th-order
# integrator keeps conservation tight despite the steep gradient.
#
# Uses isolated BC since NFW is a finite-extent structure. The virial
# radius r_vir = c * r_s = 10, so spatial_extent=15 captures most mass.
# Concentration c=10 is typical of Milky Way-mass halos (z≈0).

[model]
type = "nfw"
total_mass = 1.0
scale_radius = 1.0

[model.nfw]
concentration = 10.0
virial_mass = 1.0
velocity_anisotropy = "isotropic"

[domain]
spatial_extent = 15.0
velocity_extent = 3.5
spatial_resolution = 32
velocity_resolution = 16
boundary = "isolated|truncated"
coordinates = "cartesian"
gravitational_constant = 1.0

[solver]
representation = "uniform"
poisson = "fft_isolated"
advection = "semi_lagrangian"
integrator = "yoshida"

[time]
t_final = 25.0
dt_mode = "adaptive"
cfl_factor = 0.35

[output]
directory = "output/nfw_high_res"
prefix = "run"
snapshot_interval = 1.0

[exit]
energy_drift_tolerance = 5.0
mass_drift_tolerance = 0.5

[performance]
memory_budget_gb = 4.0
