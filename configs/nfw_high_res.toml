# NFW High-Res — Navarro-Frenk-White c=10 halo at moderate resolution
#
# 20^3 × 20^3 uniform grid.  Phase-space ≈ 512 MB, peak ~1 GB.
# NFW profiles have a central cusp ρ ∝ 1/r, which is harder to
# resolve than the cored Plummer model.  Yoshida 4th-order integrator
# helps keep conservation tight despite the steep density gradient.
#
# Concentration parameter c = 10 is typical of Milky Way-mass halos.

[model]
type = "nfw"
total_mass = 1.0
scale_radius = 1.0

[model.nfw]
concentration = 10.0              # c = r_vir / r_s

[domain]
spatial_extent = 12.0
velocity_extent = 3.5
spatial_resolution = 20
velocity_resolution = 20
boundary = "periodic|truncated"
coordinates = "cartesian"
gravitational_constant = 1.0

[solver]
representation = "uniform"
poisson = "fft_periodic"
advection = "semi_lagrangian"
integrator = "yoshida"

[time]
t_final = 25.0
dt_mode = "adaptive"
cfl_factor = 0.35

[output]
directory = "output/nfw_high_res"
prefix = "run"
snapshot_interval = 1.0

[exit]
energy_drift_tolerance = 2.0
mass_drift_tolerance = 0.2

[performance]
memory_budget_gb = 4.0
