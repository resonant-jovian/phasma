# King model — tidally truncated isothermal sphere
# Concentration parameter W0 = 6 (moderate tidal truncation).

[model]
type         = "king"
mass         = "1.0"
scale_radius = "0.15"

[domain]
spatial_extent      = "3.0"
velocity_extent     = "3.5"
spatial_resolution  = "32"
velocity_resolution = "32"
boundary            = "open"

[solver]
representation = "uniform"
poisson        = "fft"
advection      = "semi_lagrangian"
splitting      = "strang"

[time]
t_final    = "15.0"
dt         = "adaptive"
cfl_factor = "0.4"

[output]
interval  = "1.0"
directory = "output/king_model"
format    = "hdf5"

[exit]
energy_tolerance = "1e-4"
mass_threshold   = "0.01"
