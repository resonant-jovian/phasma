# Jeans Instability — uniform Maxwellian with sinusoidal density perturbation
#
# Tests the gravitational instability of a warm, uniform background.
# When k < k_J = sqrt(4*pi*G*rho0) / sigma, the perturbation grows
# exponentially. When k > k_J, it oscillates stably.
#
# This preset uses k_fund = pi/L = 1.0 with sigma=0.5, rho0=1.0,
# giving k_J = sqrt(4*pi) / 0.5 ≈ 7.1 >> k_fund → unstable.
# Growth rate gamma = sqrt(4*pi*G*rho0 - k^2*sigma^2) ≈ 3.4 /time.
#
# Memory: 8^6 × 8 B ≈ 2 MB (tiny). Good for quick validation.

[model]
type = "uniform_perturbation"
total_mass = 1.0
scale_radius = 1.0

[model.uniform_perturbation]
background_density = 1.0
velocity_dispersion = 0.5
perturbation_amplitude = 0.1
perturbation_wavenumber = [1.0, 0.0, 0.0]

[domain]
spatial_extent = 3.14159265   # pi — one half-wavelength of k=1 mode
velocity_extent = 3.0
spatial_resolution = 8
velocity_resolution = 8
boundary = "periodic|open"
coordinates = "cartesian"
gravitational_constant = 1.0

[solver]
representation = "uniform"
poisson = "fft_periodic"
advection = "semi_lagrangian"
integrator = "strang"

[time]
t_final = 2.0               # ~6.8 e-folding times → strong growth visible
dt_mode = "adaptive"
cfl_factor = 0.5

[output]
directory = "output/jeans_instability"
prefix = "run"
snapshot_interval = 0.1

[exit]
energy_drift_tolerance = 50.0  # very large — energy grows exponentially during instability
mass_drift_tolerance = 0.5
