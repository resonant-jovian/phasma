# Spectral Velocity Plummer — Hermite velocity basis representation
#
# Uses Hermite polynomials in velocity space instead of a uniform grid.
# The velocity distribution is expanded in n_modes basis functions,
# which can be more efficient when the velocity distribution is smooth.
#
# Good for problems where the velocity space is well-resolved by a
# moderate number of Hermite modes (e.g., near-Maxwellian distributions).

[model]
type = "plummer"
total_mass = 1.0
scale_radius = 1.0

[domain]
spatial_extent = 10.0
velocity_extent = 3.0
spatial_resolution = 16
velocity_resolution = 16
boundary = "isolated|truncated"
coordinates = "cartesian"
gravitational_constant = 1.0

[solver]
representation = "spectral"
poisson = "fft_isolated"
advection = "semi_lagrangian"
integrator = "strang"

[solver.ht]
# n_modes is read from initial_rank for spectral repr
initial_rank = 16

[time]
t_final = 20.0
dt_mode = "adaptive"
cfl_factor = 0.5

[output]
directory = "output/spectral_plummer"
prefix = "run"
snapshot_interval = 1.0

[exit]
energy_drift_tolerance = 5.0
mass_drift_tolerance = 0.5
