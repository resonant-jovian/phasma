# Hernquist Galaxy — Analytic DF galaxy model
#
# Phase-space: 16^6 × 8 B ≈ 134 MB.  Peak ~300 MB.
# Hernquist profile ρ(r) = M a / (2π r (r+a)³) is cuspy (ρ ∝ 1/r),
# which makes it harder to maintain equilibrium than Plummer.
#
# Uses Yoshida 4th-order integrator for best conservation through
# the steep central gradient.  The closed-form DF (Hernquist 1990
# eq. 17) ensures exact initialisation.
#
# Watch F7 Profiles to compare simulated ρ(r) against the analytic
# overlay — any artificial relaxation shows up as core expansion.

[model]
type = "hernquist"
total_mass = 1.0
scale_radius = 1.0

[domain]
spatial_extent = 10.0
velocity_extent = 3.0
spatial_resolution = 16
velocity_resolution = 16
boundary = "isolated|truncated"
coordinates = "cartesian"
gravitational_constant = 1.0

[solver]
representation = "uniform"
poisson = "fft_isolated"
advection = "semi_lagrangian"
integrator = "yoshida"

[time]
t_final = 25.0            # ~10 dynamical times
dt_mode = "adaptive"
cfl_factor = 0.4

[output]
directory = "output/hernquist_galaxy"
prefix = "run"
snapshot_interval = 1.0

[exit]
energy_drift_tolerance = 5.0
mass_drift_tolerance = 0.5
