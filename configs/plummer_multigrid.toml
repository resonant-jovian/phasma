# Plummer Multigrid — V-cycle geometric multigrid Poisson solver
#
# Uses multigrid instead of FFT for the Poisson equation.
# V-cycle with red-black Gauss-Seidel smoother.
# Rayon-parallelized.
# Works with both periodic and isolated BC
# and can handle non-uniform grids (future).
# Compare F9 Poisson Detail against fft_isolated.

[model]
type = "plummer"
total_mass = 1.0
scale_radius = 1.0

[domain]
spatial_extent = 10.0
velocity_extent = 3.0
spatial_resolution = 16
velocity_resolution = 16
boundary = "isolated|truncated"
coordinates = "cartesian"
gravitational_constant = 1.0

[solver]
representation = "uniform"
poisson = "multigrid"
advection = "semi_lagrangian"
integrator = "strang"

[solver.multigrid]
levels = 4
smoother = "gauss_seidel"
v_cycles = 3
omega = 1.5

[time]
t_final = 200.0
dt_mode = "adaptive"
cfl_factor = 0.01

[output]
directory = "output/plummer_multigrid"
prefix = "run"
snapshot_interval = 0.5

[exit]
energy_drift_tolerance = 100.0
mass_drift_tolerance = 0.5
