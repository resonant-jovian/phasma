# Hernquist — Cuspy analytic galaxy model
#
# 16^3 x 16^3 uniform grid.
# Phase-space ~ 134 MB.
# Hernquist profile rho(r) = M*a / (2*pi*r*(r+a)^3)
# has a 1/r central cusp,
# harder to maintain in equilibrium than Plummer.
# Yoshida 4th-order integrator
# handles the steep central gradient.
# Closed-form DF (Hernquist 1990 eq. 17)
# ensures exact initialisation.
#
# Watch F7 Profiles for rho(r) vs analytic overlay.
# Artificial relaxation shows up as core expansion.

[model]
type = "hernquist"
total_mass = 1.0
scale_radius = 1.0

[domain]
spatial_extent = 10.0
velocity_extent = 3.0
spatial_resolution = 16
velocity_resolution = 16
boundary = "isolated|truncated"
coordinates = "cartesian"
gravitational_constant = 1.0

[solver]
representation = "uniform"
poisson = "fft_isolated"
advection = "semi_lagrangian"
integrator = "yoshida"

[time]
t_final = 200.0
dt_mode = "adaptive"
cfl_factor = 0.01

[output]
directory = "output/hernquist"
prefix = "run"
snapshot_interval = 0.5

[exit]
energy_drift_tolerance = 100.0
mass_drift_tolerance = 0.5
