# Hernquist profile — r^-1 cusp, r^-4 envelope
# Standard model for elliptical galaxy bulges.

[model]
type         = "hernquist"
mass         = "1.0"
scale_radius = "0.2"

[domain]
spatial_extent      = "5.0"
velocity_extent     = "3.0"
spatial_resolution  = "32"
velocity_resolution = "32"
boundary            = "open"

[solver]
representation = "uniform"
poisson        = "fft"
advection      = "semi_lagrangian"
splitting      = "yoshida"

[time]
t_final    = "25.0"
dt         = "adaptive"
cfl_factor = "0.4"

[output]
interval  = "1.0"
directory = "output/hernquist"
format    = "hdf5"

[exit]
energy_tolerance = "1e-4"
mass_threshold   = "0.005"
