# Plummer — Blanes-Moan 4th-order splitting
#
# 8^3 x 8^3 uniform grid.
# Uses the Blanes-Moan (2002) 4th-order symmetric splitting,
# which achieves 4th-order accuracy with 6 sub-steps (fewer than
# Yoshida's 7). Good balance of accuracy and cost for smooth potentials.
#
# Watch F5 Energy for 4th-order energy conservation.

[model]
type = "plummer"
total_mass = 1.0
scale_radius = 1.0

[domain]
spatial_extent = 8.0
velocity_extent = 2.5
spatial_resolution = 8
velocity_resolution = 8
boundary = "periodic|truncated"
coordinates = "cartesian"
gravitational_constant = 1.0

[solver]
representation = "uniform"
poisson = "fft_periodic"
advection = "semi_lagrangian"
integrator = "blanes_moan"

[time]
t_final = 10.0
dt_mode = "adaptive"
cfl_factor = 0.3

[output]
directory = "output/plummer_bm4"
prefix = "run"
snapshot_interval = 0.5
