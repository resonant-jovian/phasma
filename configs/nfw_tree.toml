# NFW Tree — Barnes-Hut octree Poisson solver on NFW halo
#
# 16^3 x 16^3 uniform grid.
# Phase-space ~ 134 MB.
# Uses the octree-based Barnes-Hut gravity solver (theta=0.5)
# instead of FFT.
# O(N^3 log N^3) scaling with natural isolated BC.
# No zero-padding needed.
# Combined with NFW c=10
# for a realistic cuspy dark matter distribution.

[model]
type = "nfw"
total_mass = 1.0
scale_radius = 1.0

[model.nfw]
concentration = 10.0
virial_mass = 1.0
velocity_anisotropy = "isotropic"

[domain]
spatial_extent = 10.0
velocity_extent = 3.0
spatial_resolution = 16
velocity_resolution = 16
boundary = "isolated|truncated"
coordinates = "cartesian"
gravitational_constant = 1.0

[solver]
representation = "uniform"
poisson = "tree"
advection = "semi_lagrangian"
integrator = "strang"

[time]
t_final = 200.0
dt_mode = "adaptive"
cfl_factor = 0.01

[output]
directory = "output/nfw_tree"
prefix = "run"
snapshot_interval = 0.5

[exit]
energy_drift_tolerance = 100.0
mass_drift_tolerance = 0.5
