# Tidal Stream — Plummer progenitor in a point-mass host potential
#
# Demonstrates tidal stripping of a small satellite in a host galaxy's
# gravitational field. The progenitor starts at (5,0,0) with an
# orbital velocity and develops tidal tails.
#
# Uses isolated FFT since the system is not periodic.

[model]
type = "tidal"
total_mass = 0.1
scale_radius = 0.5

[model.tidal]
progenitor_type = "plummer"
progenitor_mass = 0.1
progenitor_scale_radius = 0.5
host_type = "point_mass"
host_mass = 10.0
host_scale_radius = 20.0
progenitor_position = [5.0, 0.0, 0.0]
progenitor_velocity = [0.0, 1.0, 0.0]

[domain]
spatial_extent = 12.0
velocity_extent = 3.0
spatial_resolution = 16
velocity_resolution = 16
boundary = "isolated|truncated"
coordinates = "cartesian"
gravitational_constant = 1.0

[solver]
representation = "uniform"
poisson = "fft_isolated"
advection = "semi_lagrangian"
integrator = "strang"

[time]
t_final = 50.0
dt_mode = "adaptive"
cfl_factor = 0.3

[output]
directory = "output/tidal_stream"
prefix = "run"
snapshot_interval = 2.0

[exit]
energy_drift_tolerance = 10.0  # tidal interaction drives significant energy exchange
mass_drift_tolerance = 5.0     # mass escapes through domain boundary during stripping
caustic_formation = true
