# Speed Priority — 8^3 x 8^3 Plummer, fast iteration
# Use for quick smoke tests and parameter exploration

[model]
type = "plummer"
total_mass = 1.0
scale_radius = 1.0

[domain]
spatial_extent = 8.0
velocity_extent = 2.5
spatial_resolution = 8
velocity_resolution = 8
boundary = "periodic|truncated"
coordinates = "cartesian"
gravitational_constant = 1.0

[solver]
representation = "uniform"
poisson = "fft_periodic"
advection = "semi_lagrangian"
integrator = "strang"

[time]
t_final = 1000.0
dt_mode = "adaptive"
cfl_factor = 0.01

[output]
directory = "output/speed_priority"
prefix = "run"
snapshot_interval = 1.0

[exit]
energy_drift_tolerance = 100.0
mass_drift_tolerance = 0.5

[performance]
memory_budget_gb = 4.0
