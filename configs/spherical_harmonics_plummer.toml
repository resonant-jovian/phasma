# Spherical Harmonics Poisson — Legendre decomposition for isolated gravity
#
# The spherical harmonics Poisson solver decomposes the density field
# into spherical harmonics Y_lm(theta, phi) and solves the resulting
# radial ODE for each (l,m) mode. Natural for spherical systems like
# halos and globular clusters where few l-modes dominate.
#
# Uses l_max=8, capturing monopole through octupole and beyond.
# Compare potential accuracy on F9 Poisson Detail against fft_isolated.
#
# Memory: 16^6 × 8 B ≈ 134 MB (same grid, different Poisson solver).

[model]
type = "plummer"
total_mass = 1.0
scale_radius = 1.0

[domain]
spatial_extent = 10.0
velocity_extent = 3.0
spatial_resolution = 16
velocity_resolution = 16
boundary = "isolated|truncated"
coordinates = "cartesian"
gravitational_constant = 1.0

[solver]
representation = "uniform"
poisson = "spherical_harmonics"
advection = "semi_lagrangian"
integrator = "strang"

[time]
t_final = 20.0
dt_mode = "adaptive"
cfl_factor = 0.3

[output]
directory = "output/spherical_harmonics"
prefix = "run"
snapshot_interval = 1.0

[exit]
energy_drift_tolerance = 5.0
mass_drift_tolerance = 0.5
