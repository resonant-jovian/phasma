# Resolution Priority — 32^3 × 32^3 Plummer with Yoshida 4th-order
#
# Phase-space: 32^6 × 8 B ≈ 8.6 GB.  Peak memory ~17 GB with
# FFT scratch, snapshot, and diagnostics buffers.
# **Requires ≥32 GB RAM.**
#
# This is the highest-resolution Plummer preset.  With Yoshida 4th-order
# and tight exit tolerances, it produces the most accurate dynamics
# and serves as a reference for convergence studies.
#
# Wall-clock: each timestep is ~100× slower than speed_priority due
# to the 64× larger grid and 3.5× more sub-steps per dt.

[model]
type = "plummer"
total_mass = 1.0
scale_radius = 1.0

[domain]
spatial_extent = 10.0
velocity_extent = 3.0
spatial_resolution = 32
velocity_resolution = 32
boundary = "periodic|truncated"
coordinates = "cartesian"
gravitational_constant = 1.0

[solver]
representation = "uniform"
poisson = "fft_periodic"
advection = "semi_lagrangian"
integrator = "yoshida"

[time]
t_final = 20.0
dt_mode = "adaptive"
cfl_factor = 0.4

[output]
directory = "output/resolution_priority"
prefix = "run"
snapshot_interval = 1.0

[exit]
energy_drift_tolerance = 0.1     # tight — stop early if drift is bad
mass_drift_tolerance = 0.05

[performance]
memory_budget_gb = 40.0
