# Merger — Two equal-mass Plummer bodies
#
# Phase-space: 16^6 × 8 B ≈ 134 MB.  Peak ~300 MB.
# Initialises f = f₁(x−x₁, v) + f₂(x−x₂, v) — the collisionless
# superposition principle guarantees this is an exact initial state.
#
# The bodies start at rest, separated by 6 scale radii, and fall
# toward each other under mutual gravity.  First passage occurs at
# t ≈ 10, turnaround at t ≈ 18, and near-complete coalescence by
# t ≈ 30.  The F3 Density tab shows this beautifully.

[model]
type = "merger"
total_mass = 2.0           # combined mass of both bodies
scale_radius = 1.0

[model.merger]
separation = 6.0           # initial centre-to-centre distance
mass_ratio = 1.0           # equal-mass → symmetric merger

[domain]
spatial_extent = 12.0      # large box to contain the orbit
velocity_extent = 3.5
spatial_resolution = 16
velocity_resolution = 16
boundary = "periodic|truncated"
coordinates = "cartesian"
gravitational_constant = 1.0

[solver]
representation = "uniform"
poisson = "fft_periodic"
advection = "semi_lagrangian"
integrator = "strang"

[time]
t_final = 30.0
dt_mode = "adaptive"
cfl_factor = 0.5

[output]
directory = "output/merger"
prefix = "run"
snapshot_interval = 1.0

[exit]
energy_drift_tolerance = 5.0
mass_drift_tolerance = 0.5
