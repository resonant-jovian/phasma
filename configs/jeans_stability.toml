# Jeans Stability — stable oscillation above the Jeans wavelength
#
# Same setup as jeans_instability but with high velocity dispersion
# sigma=2.0. The Jeans wavenumber k_J = sqrt(4*pi*G*rho0) / sigma
# ≈ 1.77, and the perturbation wavenumber k=3.0 > k_J, so the
# mode oscillates stably instead of growing.
#
# The oscillation frequency omega = sqrt(k^2*sigma^2 - 4*pi*G*rho0)
# ≈ 4.9. Over t_final=5.0, expect ~4 oscillation cycles visible
# on F3 Density as the perturbation amplitude oscillates.
#
# Validates that the solver does NOT produce spurious growth for
# stable modes — a critical correctness check.
#
# Memory: 8^6 × 8 B ≈ 2 MB.

[model]
type = "uniform_perturbation"
total_mass = 1.0
scale_radius = 1.0

[model.uniform_perturbation]
background_density = 1.0
velocity_dispersion = 2.0              # large sigma → stable mode
perturbation_amplitude = 0.05
perturbation_wavenumber = [3.0, 0.0, 0.0]

[domain]
spatial_extent = 3.14159265            # pi
velocity_extent = 8.0                  # wider for large sigma
spatial_resolution = 8
velocity_resolution = 8
boundary = "periodic|open"
coordinates = "cartesian"
gravitational_constant = 1.0

[solver]
representation = "uniform"
poisson = "fft_periodic"
advection = "semi_lagrangian"
integrator = "strang"

[time]
t_final = 5.0
dt_mode = "adaptive"
cfl_factor = 0.5

[output]
directory = "output/jeans_stability"
prefix = "run"
snapshot_interval = 0.1

[exit]
energy_drift_tolerance = 5.0
mass_drift_tolerance = 0.5
