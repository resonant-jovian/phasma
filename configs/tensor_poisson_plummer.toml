# Tensor Poisson — Braess-Hackbusch exponential-sum Green's function solver
#
# Uses the low-rank exp-sum approximation 1/r ≈ Sigma c_k exp(-alpha_k r^2)
# combined with dense 3D FFT convolution for O(N^3 log N) isolated-BC
# gravity. The Green's function is precomputed on a (2N)^3 zero-padded
# grid — same Hockney-Eastwood principle as fft_isolated but with a
# tensor-structured kernel.
#
# Compare accuracy on F9 Poisson Detail against fft_isolated and tree.
# The exp-sum approximation has ~30 terms for 1e-6 accuracy.
#
# Memory: 16^6 × 8 B ≈ 134 MB phase-space + ~67 MB Poisson buffers.

[model]
type = "plummer"
total_mass = 1.0
scale_radius = 1.0

[domain]
spatial_extent = 10.0
velocity_extent = 3.0
spatial_resolution = 16
velocity_resolution = 16
boundary = "isolated|truncated"
coordinates = "cartesian"
gravitational_constant = 1.0

[solver]
representation = "uniform"
poisson = "tensor"
advection = "semi_lagrangian"
integrator = "strang"

[solver.exponential_sum]
num_terms = 30
accuracy = 1e-6

[time]
t_final = 20.0
dt_mode = "adaptive"
cfl_factor = 0.3

[output]
directory = "output/tensor_poisson"
prefix = "run"
snapshot_interval = 1.0

[exit]
energy_drift_tolerance = 5.0
mass_drift_tolerance = 0.5
