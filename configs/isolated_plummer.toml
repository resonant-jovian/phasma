# Isolated Plummer — Demonstrates isolated (non-periodic) boundary conditions
#
# 16^3 × 16^3 uniform grid.  Phase-space ≈ 134 MB, peak ~300 MB.
# Uses FftIsolated (Hockney-Eastwood zero-padding) so the potential
# does not wrap around through the periodic images.  This is the correct
# solver for studying a single object in vacuum.
#
# The box must be large enough that the density falls to ~zero at the
# boundary; spatial_extent = 12 gives ~6 scale radii of padding.

[model]
type = "plummer"
total_mass = 1.0
scale_radius = 1.0

[domain]
spatial_extent = 12.0             # generous box to avoid boundary artefacts
velocity_extent = 3.0
spatial_resolution = 16
velocity_resolution = 16
boundary = "isolated|truncated"   # isolated spatial BC + velocity truncation
coordinates = "cartesian"
gravitational_constant = 1.0

[solver]
representation = "uniform"
poisson = "fft_isolated"          # Hockney-Eastwood zero-padded FFT
advection = "semi_lagrangian"
integrator = "strang"

[time]
t_final = 20.0
dt_mode = "adaptive"
cfl_factor = 0.3

[output]
directory = "output/isolated_plummer"
prefix = "run"
snapshot_interval = 1.0

[exit]
energy_drift_tolerance = 1.0
mass_drift_tolerance = 0.1

[performance]
memory_budget_gb = 4.0
