# Disk Bar — Exponential disk with m=2 bar perturbation
#
# 16^3 x 16^3 uniform grid.
# Phase-space ~ 134 MB.
# Thin stellar disk with exponential surface density
# and Shu (1969) DF.
# m=2 bar-mode perturbation seeded at 5% amplitude.
# Marginally unstable to bar formation.
# Isolated BC for a finite-extent structure.
#
# Watch F3 Density for spiral arm development
# and bar-mode growth on F4 Phase Space.
# Increase to 32^3 for production runs (8.6 GB).

[model]
type = "disk_stability"
total_mass = 1.0
scale_radius = 3.0

[model.disk]
disk_mass = 1.0
disk_scale_length = 3.0
disk_scale_height = 0.3
radial_velocity_dispersion = 0.15
halo_type = "nfw"
halo_mass = 10.0
halo_concentration = 10.0
toomre_q = 1.5

[domain]
spatial_extent = 20.0
velocity_extent = 2.0
spatial_resolution = 16
velocity_resolution = 16
boundary = "isolated|truncated"
coordinates = "cartesian"
gravitational_constant = 1.0

[solver]
representation = "uniform"
poisson = "fft_isolated"
advection = "semi_lagrangian"
integrator = "strang"

[time]
t_final = 300.0
dt_mode = "adaptive"
cfl_factor = 0.01

[output]
directory = "output/disk_bar"
prefix = "run"
snapshot_interval = 0.5

[exit]
energy_drift_tolerance = 100.0
mass_drift_tolerance = 0.5
