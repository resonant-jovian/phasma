# Plummer sphere — quick low-resolution test run
# Good for verifying the pipeline works end-to-end fast.

[model]
type         = "plummer"
mass         = "1.0"
scale_radius = "0.1"

[domain]
spatial_extent      = "2.0"
velocity_extent     = "4.0"
spatial_resolution  = "16"
velocity_resolution = "16"
boundary            = "open"

[solver]
representation = "uniform"
poisson        = "fft"
advection      = "semi_lagrangian"
splitting      = "strang"

[time]
t_final    = "5.0"
dt         = "adaptive"
cfl_factor = "0.5"

[output]
interval  = "0.5"
directory = "output/plummer_quick"
format    = "hdf5"

[exit]
energy_tolerance = "1e-3"
mass_threshold   = "0.01"
