# NFW — Navarro-Frenk-White c=10 dark matter halo
#
# 16^3 x 16^3 uniform grid.
# Phase-space ~ 134 MB.
# NFW (1996) is the standard cosmological dark matter halo profile.
# Central 1/r cusp + 1/r^3 outer envelope.
# Scale radius r_s marks the transition.
# Concentration c = r_vir/r_s = 10
# is typical of Milky-Way mass halos.
#
# DF computed via numerical Eddington inversion.
# Yoshida 4th-order for the cuspy profile.
# Isolated BC since NFW is a finite structure.

[model]
type = "nfw"
total_mass = 1.0
scale_radius = 1.0

[model.nfw]
concentration = 10.0
virial_mass = 1.0
velocity_anisotropy = "isotropic"

[domain]
spatial_extent = 15.0
velocity_extent = 3.5
spatial_resolution = 16
velocity_resolution = 16
boundary = "isolated|truncated"
coordinates = "cartesian"
gravitational_constant = 1.0

[solver]
representation = "uniform"
poisson = "fft_isolated"
advection = "semi_lagrangian"
integrator = "yoshida"

[time]
t_final = 200.0
dt_mode = "adaptive"
cfl_factor = 0.01

[output]
directory = "output/nfw"
prefix = "run"
snapshot_interval = 0.5

[exit]
energy_drift_tolerance = 100.0
mass_drift_tolerance = 0.5
