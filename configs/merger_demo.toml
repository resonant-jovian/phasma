# Merger Demo — Equal-mass Plummer merger at compact resolution
#
# 16^3 × 16^3 uniform grid.  Phase-space ≈ 134 MB, peak ~300 MB.
# Two equal-mass Plummer spheres separated by 6 scale radii.
# Frequent snapshots (Δt = 0.5) let you watch the merger unfold
# frame-by-frame on the F3 Density and F4 Phase Space tabs.
#
# The large t_final = 40 covers ~2 orbital periods, enough to see
# the first passage, turnaround, and coalescence.

[model]
type = "merger"
total_mass = 2.0                  # combined mass of both bodies
scale_radius = 1.0

[model.merger]
separation = 6.0                  # initial centre-to-centre distance
mass_ratio = 1.0                  # equal-mass merger

[domain]
spatial_extent = 12.0
velocity_extent = 3.5
spatial_resolution = 16
velocity_resolution = 16
boundary = "periodic|truncated"
coordinates = "cartesian"
gravitational_constant = 1.0

[solver]
representation = "uniform"
poisson = "fft_periodic"
advection = "semi_lagrangian"
integrator = "strang"

[time]
t_final = 40.0
dt_mode = "adaptive"
cfl_factor = 0.4

[output]
directory = "output/merger_demo"
prefix = "run"
snapshot_interval = 0.5           # frequent snapshots for animation

[exit]
energy_drift_tolerance = 5.0
mass_drift_tolerance = 0.5

[performance]
memory_budget_gb = 4.0
