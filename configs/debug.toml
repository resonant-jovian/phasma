# Debug — Instant feedback on a tiny grid
#
# 8^3 x 8^3 uniform Plummer.
# Phase-space: 8^6 x 8 B = 2 MB.
# Lie splitting (cheapest per step) with very small CFL factor.
# Not physically meaningful.
# Purely for exercising the full pipeline,
# checking that all TUI tabs render,
# and quick smoke tests.

[model]
type = "plummer"
total_mass = 1.0
scale_radius = 1.0

[domain]
spatial_extent = 8.0
velocity_extent = 2.5
spatial_resolution = 8
velocity_resolution = 8
boundary = "periodic|truncated"
coordinates = "cartesian"
gravitational_constant = 1.0

[solver]
representation = "uniform"
poisson = "fft_periodic"
advection = "semi_lagrangian"
integrator = "lie"

[time]
t_final = 200.0
dt_mode = "adaptive"
cfl_factor = 0.01

[output]
directory = "output/debug"
prefix = "run"
snapshot_interval = 1.0

[exit]
energy_drift_tolerance = 100.0
mass_drift_tolerance = 0.01

[performance]
memory_budget_gb = 1.0
