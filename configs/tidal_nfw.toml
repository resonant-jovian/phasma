# Tidal NFW — Plummer progenitor in an NFW halo potential
#
# 32^3 x 16^3 uniform grid.
# Phase-space ~ 1 GB.
# Same concept as tidal_point
# but with a realistic NFW host potential.
# NFW Phi(r) = -G*M*ln(1+r/r_s)/r
# produces a flat rotation curve at large radii.
# Progenitor on a circular-ish orbit at r=8.0,
# v_circ ~ 1.2.
# Tidal stripping forms leading and trailing streams
# tracing the orbit.

[model]
type = "tidal"
total_mass = 0.05
scale_radius = 0.3

[model.tidal]
progenitor_type = "plummer"
progenitor_mass = 0.05
progenitor_scale_radius = 0.3
host_type = "nfw_fixed"
host_mass = 10.0
host_scale_radius = 5.0
progenitor_position = [8.0, 0.0, 0.0]
progenitor_velocity = [0.0, 1.2, 0.0]

[domain]
spatial_extent = 15.0
velocity_extent = 3.0
spatial_resolution = 32
velocity_resolution = 16
boundary = "isolated|truncated"
coordinates = "cartesian"
gravitational_constant = 1.0

[solver]
representation = "uniform"
poisson = "vgf"
advection = "semi_lagrangian"
integrator = "strang"

[time]
t_final = 500.0
dt_mode = "adaptive"
cfl_factor = 0.01

[output]
directory = "output/tidal_nfw"
prefix = "run"
snapshot_interval = 0.1

[exit]
energy_drift_tolerance = 100.0
mass_drift_tolerance = 5.0
caustic_formation = true
