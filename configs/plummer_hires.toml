# Plummer High-Res — 32^3 x 32^3 convergence reference
#
# Phase-space: 32^6 x 8 B ~ 8.6 GB.
# Peak ~17 GB.
# Requires >= 32 GB RAM.
# Highest-resolution Plummer preset.
# Yoshida 4th-order integrator.
# Serves as the reference solution for convergence studies
# against lower-resolution Plummer runs.

[model]
type = "plummer"
total_mass = 1.0
scale_radius = 1.0

[domain]
spatial_extent = 10.0
velocity_extent = 3.0
spatial_resolution = 32
velocity_resolution = 32
boundary = "isolated|truncated"
coordinates = "cartesian"
gravitational_constant = 1.0

[solver]
representation = "uniform"
poisson = "vgf"
advection = "semi_lagrangian"
integrator = "yoshida"

[time]
t_final = 200.0
dt_mode = "adaptive"
cfl_factor = 0.01

[output]
directory = "output/plummer_hires"
prefix = "run"
snapshot_interval = 0.5

[exit]
energy_drift_tolerance = 100.0
mass_drift_tolerance = 0.5

[performance]
memory_budget_gb = 40.0
