# NFW Dark Matter — Concentration c = 10 dark matter halo
#
# Phase-space: 16^6 × 8 B ≈ 134 MB.  Peak ~300 MB.
# NFW (Navarro, Frenk & White 1996) is the standard profile for
# cosmological dark matter halos.  It has a 1/r central cusp and
# a 1/r³ outer envelope, with a scale radius r_s marking the
# transition.  Concentration c = r_vir/r_s = 10 is typical of
# Milky-Way mass halos.
#
# DF is computed via numerical Eddington inversion.  Yoshida 4th-order
# integrator is recommended for the cuspy profile.

[model]
type = "nfw"
total_mass = 1.0
scale_radius = 1.0

[model.nfw]
concentration = 10.0       # c = r_vir / r_s

[domain]
spatial_extent = 12.0
velocity_extent = 3.5
spatial_resolution = 16
velocity_resolution = 16
boundary = "periodic|truncated"
coordinates = "cartesian"
gravitational_constant = 1.0

[solver]
representation = "uniform"
poisson = "fft_periodic"
advection = "semi_lagrangian"
integrator = "yoshida"

[time]
t_final = 30.0
dt_mode = "adaptive"
cfl_factor = 0.4

[output]
directory = "output/nfw_dark_matter"
prefix = "run"
snapshot_interval = 2.0

[exit]
energy_drift_tolerance = 5.0
mass_drift_tolerance = 0.5
