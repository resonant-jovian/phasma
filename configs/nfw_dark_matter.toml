# NFW Dark Matter — concentration c=10 halo
# Cuspy dark matter halo with Yoshida 4th-order integrator

[model]
type = "nfw"
total_mass = 1.0
scale_radius = 1.0

[model.nfw]
concentration = 10.0

[domain]
spatial_extent = 12.0
velocity_extent = 3.5
spatial_resolution = 16
velocity_resolution = 16
boundary = "periodic|truncated"
coordinates = "cartesian"
gravitational_constant = 1.0

[solver]
representation = "uniform"
poisson = "fft_periodic"
advection = "semi_lagrangian"
integrator = "yoshida"

[time]
t_final = 30.0
dt_mode = "adaptive"
cfl_factor = 0.4

[output]
directory = "output/nfw_dark_matter"
prefix = "run"
snapshot_interval = 2.0

[exit]
energy_drift_tolerance = 5.0
mass_drift_tolerance = 0.5
