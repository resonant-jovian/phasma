# Plummer Spectral — Hermite velocity basis representation
#
# Uses Hermite polynomials in velocity space
# instead of a uniform grid.
# The velocity distribution is expanded in n_modes basis functions.
# Efficient when the velocity distribution is smooth
# (near-Maxwellian).

[model]
type = "plummer"
total_mass = 1.0
scale_radius = 1.0

[domain]
spatial_extent = 10.0
velocity_extent = 3.0
spatial_resolution = 16
velocity_resolution = 16
boundary = "isolated|truncated"
coordinates = "cartesian"
gravitational_constant = 1.0

[solver]
representation = "spectral"
poisson = "fft_isolated"
advection = "semi_lagrangian"
integrator = "strang"

[solver.ht]
initial_rank = 16

[time]
t_final = 1000.0
dt_mode = "adaptive"
cfl_factor = 0.01

[output]
directory = "output/plummer_spectral"
prefix = "run"
snapshot_interval = 0.5

[exit]
energy_drift_tolerance = 100.0
mass_drift_tolerance = 0.5
