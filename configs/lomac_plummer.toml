# LoMaC Conservation — Uniform grid with Locally Moment-Conserving framework
#
# Demonstrates the LoMaC conservation framework on a standard uniform
# grid Plummer sphere. LoMaC couples a KFVS (kinetic flux vector splitting)
# macroscopic solver with conservative SVD projection to enforce exact
# conservation of mass, momentum, and energy after each timestep.
#
# Compare F5 Energy drift against conservation_priority (Yoshida, no LoMaC)
# to see machine-precision conservation vs symplectic integrator drift.
#
# Memory: 16^6 × 8 B ≈ 134 MB + ~134 MB LoMaC macroscopic state.

[model]
type = "plummer"
total_mass = 1.0
scale_radius = 1.0

[domain]
spatial_extent = 10.0
velocity_extent = 3.0
spatial_resolution = 16
velocity_resolution = 16
boundary = "periodic|truncated"
coordinates = "cartesian"
gravitational_constant = 1.0

[solver]
representation = "uniform"
poisson = "fft_periodic"
advection = "semi_lagrangian"
integrator = "strang"
conservation = "lomac"

[solver.lomac]
flux_scheme = "kfvs"
projection_tolerance = 1e-12

[time]
t_final = 10.0
dt_mode = "adaptive"
cfl_factor = 0.3

[output]
directory = "output/lomac_plummer"
prefix = "run"
snapshot_interval = 0.5

[exit]
energy_drift_tolerance = 1e-4        # tight — LoMaC should preserve to machine precision
mass_drift_tolerance = 1e-8
