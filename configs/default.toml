# Default — Good all-around preset, fits within 8 GB RAM
#
# 24^3 × 24^3 uniform Plummer sphere.
# Phase-space array: 24^6 × 8 bytes ≈ 1.5 GB.  Peak memory ~3 GB
# with snapshot + FFT scratch buffers.
#
# Strang splitting gives 2nd-order symplectic time integration.
# Adaptive dt with cfl_factor = 0.3 keeps energy drift small.
# Generous exit tolerances let the simulation run without premature stops.
#
# Estimated wall-clock: a few minutes for t_final = 20 on a modern
# desktop (depends on core count — uses rayon for parallelism).

[model]
# Plummer sphere: isotropic, cored, analytic DF — the safest default
type = "plummer"
total_mass = 1.0          # M in code units
scale_radius = 1.0        # a — core softening length

[domain]
spatial_extent = 10.0       # box spans [-10, +10] in each dimension
velocity_extent = 3.0       # velocity box [-3, +3]
spatial_resolution = 24     # N_x = 24 per dimension → 24^3 spatial grid
velocity_resolution = 24    # N_v = 24 per dimension → 24^3 velocity grid
boundary = "periodic|truncated"   # spatial = periodic FFT, velocity = hard cutoff
coordinates = "cartesian"
gravitational_constant = 1.0

[solver]
representation = "uniform"       # full 6D grid (UniformGrid6D)
poisson = "fft_periodic"         # spectral Poisson solve (periodic BC)
advection = "semi_lagrangian"    # CFL-free Catmull-Rom interpolation
integrator = "strang"            # 2nd-order Strang splitting (drift-kick-drift)

[time]
t_final = 20.0           # ~10 dynamical times for Plummer
dt_mode = "adaptive"      # dt chosen by CFL + dynamical-time constraints
cfl_factor = 0.3          # fraction of CFL limit (smaller = safer)

[output]
directory = "output/default"
prefix = "run"
snapshot_interval = 1.0   # save state every Δt = 1.0

[exit]
energy_drift_tolerance = 1.0     # |ΔE/E₀| trigger (generous)
mass_drift_tolerance = 0.1       # |ΔM/M₀| trigger

[performance]
memory_budget_gb = 8.0    # keep peak RSS under 8 GB
