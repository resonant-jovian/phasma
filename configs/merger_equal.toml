# Merger Equal — Two equal-mass Plummer bodies
#
# 16^3 x 16^3 uniform grid.
# Phase-space ~ 134 MB.
# f = f1(x-x1, v) + f2(x-x2, v).
# The collisionless superposition principle
# guarantees this is an exact initial state.
#
# Bodies start at rest,
# separated by 6 scale radii.
# First passage at t ~ 10,
# turnaround at t ~ 18,
# near-complete coalescence by t ~ 30.
# Long run captures multiple orbits
# and violent relaxation.

[model]
type = "merger"
total_mass = 2.0
scale_radius = 1.0

[model.merger]
separation = 6.0
mass_ratio = 1.0

[domain]
spatial_extent = 12.0
velocity_extent = 3.5
spatial_resolution = 16
velocity_resolution = 16
boundary = "periodic|truncated"
coordinates = "cartesian"
gravitational_constant = 1.0

[solver]
representation = "uniform"
poisson = "fft_periodic"
advection = "semi_lagrangian"
integrator = "strang"

[time]
t_final = 500.0
dt_mode = "adaptive"
cfl_factor = 0.01

[output]
directory = "output/merger_equal"
prefix = "run"
snapshot_interval = 0.1

[exit]
energy_drift_tolerance = 100.0
mass_drift_tolerance = 0.5

[performance]
memory_budget_gb = 4.0
