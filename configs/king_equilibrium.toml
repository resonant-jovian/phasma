# King Equilibrium — W0=6 tidally truncated model
# Tests preservation of a King-model equilibrium

[model]
type = "king"
total_mass = 1.0
scale_radius = 1.0

[model.king]
w0 = 6.0

[domain]
spatial_extent = 10.0
velocity_extent = 1.5
spatial_resolution = 16
velocity_resolution = 16
boundary = "periodic|truncated"
coordinates = "cartesian"
gravitational_constant = 1.0

[solver]
representation = "uniform"
poisson = "fft_periodic"
advection = "semi_lagrangian"
integrator = "strang"

[time]
t_final = 15.0
dt_mode = "adaptive"
cfl_factor = 0.5

[output]
directory = "output/king_equilibrium"
prefix = "run"
snapshot_interval = 1.0

[exit]
energy_drift_tolerance = 5.0
mass_drift_tolerance = 0.5
