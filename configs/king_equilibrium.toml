# King Equilibrium — W₀ = 6 tidally truncated model
#
# Phase-space: 16^6 × 8 B ≈ 134 MB.  Peak ~300 MB.
# King models have a finite escape energy, so the DF is zero beyond
# the tidal radius.  W₀ = 6 gives a moderately concentrated globular-
# cluster-like profile.
#
# The DF is computed via Poisson-Boltzmann ODE + RK4 integration.
# velocity_extent = 1.5 is smaller than other presets because the
# King model has low escape speed.  If particles are kicked beyond
# the velocity box the mass will leak (watch ΔM/M₀ on F5).

[model]
type = "king"
total_mass = 1.0
scale_radius = 1.0

[model.king]
w0 = 6.0                  # dimensionless central potential depth

[domain]
spatial_extent = 10.0
velocity_extent = 1.5      # low escape speed → narrow velocity box
spatial_resolution = 16
velocity_resolution = 16
boundary = "isolated|truncated"
coordinates = "cartesian"
gravitational_constant = 1.0

[solver]
representation = "uniform"
poisson = "fft_isolated"
advection = "semi_lagrangian"
integrator = "strang"

[time]
t_final = 15.0
dt_mode = "adaptive"
cfl_factor = 0.5

[output]
directory = "output/king_equilibrium"
prefix = "run"
snapshot_interval = 1.0

[exit]
energy_drift_tolerance = 5.0
mass_drift_tolerance = 0.5
