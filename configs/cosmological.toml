# Cosmological — Zeldovich single-mode pancake
# Tests caustic formation in a periodic box

[model]
type = "zeldovich"
total_mass = 1.0
scale_radius = 1.0

[model.zeldovich]
amplitude = 0.3
wave_number = 1.0

[domain]
spatial_extent = 6.283185
velocity_extent = 2.0
spatial_resolution = 32
velocity_resolution = 32
boundary = "periodic|truncated"
coordinates = "cartesian"
gravitational_constant = 1.0

[solver]
representation = "uniform"
poisson = "fft_periodic"
advection = "semi_lagrangian"
integrator = "strang"

[time]
t_final = 1.2
dt_mode = "adaptive"
cfl_factor = 0.5

[output]
directory = "output/cosmological"
prefix = "run"
snapshot_interval = 0.1

[exit]
energy_drift_tolerance = 0.5
mass_drift_tolerance = 0.1
