# Plummer LoMaC — Locally Moment-Conserving framework
#
# 16^3 x 16^3 uniform grid + LoMaC macroscopic state (~ 268 MB total).
# LoMaC couples KFVS (kinetic flux vector splitting)
# with conservative SVD projection
# to enforce exact conservation of mass, momentum, and energy
# after each timestep.
# Compare F5 Energy drift against plummer.toml
# to see machine-precision conservation
# vs symplectic integrator drift.

[model]
type = "plummer"
total_mass = 1.0
scale_radius = 1.0

[domain]
spatial_extent = 10.0
velocity_extent = 3.0
spatial_resolution = 16
velocity_resolution = 16
boundary = "periodic|truncated"
coordinates = "cartesian"
gravitational_constant = 1.0

[solver]
representation = "uniform"
poisson = "fft_periodic"
advection = "semi_lagrangian"
integrator = "strang"
conservation = "lomac"

[solver.lomac]
flux_scheme = "kfvs"
projection_tolerance = 1e-12

[time]
t_final = 200.0
dt_mode = "adaptive"
cfl_factor = 0.01

[output]
directory = "output/plummer_lomac"
prefix = "run"
snapshot_interval = 0.5

[exit]
energy_drift_tolerance = 100.0
mass_drift_tolerance = 0.5
