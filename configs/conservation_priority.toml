# Conservation Priority — 16^3 x 16^3 Plummer with Yoshida + tight tolerances
# Validates energy, mass, and Casimir conservation

[model]
type = "plummer"
total_mass = 1.0
scale_radius = 1.0

[domain]
spatial_extent = 10.0
velocity_extent = 3.0
spatial_resolution = 16
velocity_resolution = 16
boundary = "periodic|truncated"
coordinates = "cartesian"
gravitational_constant = 1.0

[solver]
representation = "uniform"
poisson = "fft_periodic"
advection = "semi_lagrangian"
integrator = "yoshida"

[time]
t_final = 10.0
dt_mode = "adaptive"
cfl_factor = 0.3

[output]
directory = "output/conservation_priority"
prefix = "run"
snapshot_interval = 0.5

[exit]
energy_drift_tolerance = 5.0
mass_drift_tolerance = 0.5
