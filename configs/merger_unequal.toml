# Merger Unequal — 3:1 mass ratio off-axis encounter
#
# 32^3 x 32^3 uniform grid.
# Phase-space ~ 8.6 GB.
# Requires >= 16 GB RAM.
# Two Plummer spheres with mass ratio 3:1
# on an off-axis encounter.
# The heavier body barely deflects
# while the lighter is tidally disrupted,
# producing asymmetric tidal streams on F3 Density.
#
# Impact parameter b=2.0
# and relative velocity [0, 0.5, 0]
# create a parabolic orbit.
# The lighter body's tidal radius r_t ~ 0.47
# means it starts marginally bound
# and progressively strips.

[model]
type = "merger"
total_mass = 2.0
scale_radius = 1.0

[model.merger]
separation = 8.0
mass_ratio = 3.0
relative_velocity = [0.0, 0.5, 0.0]
impact_parameter = 2.0
model_1 = "nfw"
model_2 = "plummer"
scale_radius_1 = 1.0
scale_radius_2 = 0.7

[model.nfw]
concentration = 10.0
virial_mass = 1.0
velocity_anisotropy = "isotropic"

[domain]
spatial_extent = 30.0
velocity_extent = 6.0
spatial_resolution = 32
velocity_resolution = 32
boundary = "periodic|truncated"
coordinates = "cartesian"
gravitational_constant = 1.0

[solver]
representation = "uniform"
poisson = "fft_periodic"
advection = "semi_lagrangian"
integrator = "strang"

[time]
t_final = 500.0
dt_mode = "adaptive"
cfl_factor = 0.01

[output]
directory = "output/merger_unequal"
prefix = "run"
snapshot_interval = 0.1

[exit]
energy_drift_tolerance = 100.0
mass_drift_tolerance = 0.5
