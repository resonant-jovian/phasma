# Multigrid Plummer — V-cycle multigrid Poisson solver
#
# Uses the geometric multigrid solver instead of FFT for the Poisson
# equation. Multigrid works with both periodic and isolated BC and
# can handle non-uniform grids (future). V-cycle with red-black
# Gauss-Seidel smoother.
#
# Good for problems where the boundary conditions are complex or
# when you want to compare solver accuracy.

[model]
type = "plummer"
total_mass = 1.0
scale_radius = 1.0

[domain]
spatial_extent = 10.0
velocity_extent = 3.0
spatial_resolution = 16
velocity_resolution = 16
boundary = "isolated|truncated"
coordinates = "cartesian"
gravitational_constant = 1.0

[solver]
representation = "uniform"
poisson = "multigrid"
advection = "semi_lagrangian"
integrator = "strang"

[solver.multigrid]
levels = 4
smoother = "gauss_seidel"
v_cycles = 3
omega = 1.5

[time]
t_final = 20.0
dt_mode = "adaptive"
cfl_factor = 0.3

[output]
directory = "output/multigrid_plummer"
prefix = "run"
snapshot_interval = 1.0

[exit]
energy_drift_tolerance = 5.0
mass_drift_tolerance = 0.5
