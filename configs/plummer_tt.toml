# Plummer TT — Tensor Train representation
#
# Tensor Train decomposes f(x1,x2,x3,v1,v2,v3)
# as a chain of 3-way tensors connected by low-rank bonds.
# Memory scales as O(6*N*r^2) instead of O(N^6).
# At N=16, r=50: ~0.6 MB vs 134 MB full grid.

[model]
type = "plummer"
total_mass = 1.0
scale_radius = 1.0

[domain]
spatial_extent = 10.0
velocity_extent = 3.0
spatial_resolution = 16
velocity_resolution = 16
boundary = "isolated|truncated"
coordinates = "cartesian"
gravitational_constant = 1.0

[solver]
representation = "tensor_train"
poisson = "vgf"
advection = "semi_lagrangian"
integrator = "strang"

[solver.ht]
max_rank = 50
initial_rank = 20
tolerance = 1e-6

[time]
t_final = 1000.0
dt_mode = "adaptive"
cfl_factor = 0.01

[output]
directory = "output/plummer_tt"
prefix = "run"
snapshot_interval = 0.5

[exit]
energy_drift_tolerance = 100.0
mass_drift_tolerance = 0.5
