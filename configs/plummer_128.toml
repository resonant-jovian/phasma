# Plummer 128³ HT — High-resolution Hierarchical Tucker
#
# 128³ spatial × 128³ velocity with HT tensor compression.
# HT reduces O(N^6) = O(128^6) ~ 32 TB full grid down to
# O(dNk^3) ~ 1–1.5 GB at rank 50.
# Fits comfortably under 16 GB RAM.
#
# SLAR advection with rank-adaptive truncation.
# LoMaC conservation for exact mass/momentum/energy preservation.
# FFT isolated Poisson solver (Hockney-Eastwood) for isolated BC.
#
# Watch F6 Rank Monitor for rank evolution and singular value spectra.
# Memory estimate: ~1–1.5 GB (HT, rank 50, 128³)

[model]
type = "plummer"
total_mass = 1.0
scale_radius = 1.0

[domain]
spatial_extent = 10.0
velocity_extent = 3.0
spatial_resolution = 128
velocity_resolution = 128
boundary = "isolated|truncated"
coordinates = "cartesian"
gravitational_constant = 1.0

[solver]
representation = "hierarchical_tucker"
poisson = "vgf"
advection = "slar"
integrator = "strang"
conservation = "lomac"

[solver.ht]
max_rank = 50
initial_rank = 10
tolerance = 1e-6
rank_adaptation = "tolerance"
dimension_tree = "balanced_xv"

[solver.slar]
reconstruction_order = 3
aca_tolerance = 1e-8
max_aca_iterations = 500
oversampling_factor = 2.0

[solver.lomac]
flux_scheme = "kfvs"
projection_tolerance = 1e-12

[time]
t_final = 200.0
dt_mode = "adaptive"
cfl_factor = 0.005

[output]
directory = "output/plummer_128"
prefix = "run"
snapshot_interval = 1.0

[exit]
energy_drift_tolerance = 100.0
mass_drift_tolerance = 0.5
virial_equilibrium = true
virial_tolerance = 0.01

[performance]
memory_budget_gb = 14.0
