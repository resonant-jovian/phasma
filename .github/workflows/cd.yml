name: CD

on:
  push:
    tags:
      - "[v]?[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
            binary-name: phasma
          - os: macos-latest
            target: aarch64-apple-darwin
            binary-name: phasma
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary-name: phasma
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary-name: phasma
            use-cross: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary-name: phasma.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use-cross
        run: cargo install cross --locked

      - name: Build
        run: |
          if [ "${{ matrix.use-cross }}" = "true" ]; then
            cross build --release --locked --target ${{ matrix.target }}
          else
            cargo build --release --locked --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Package binary
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          BINARY=${{ matrix.binary-name }}
          RELEASE_NAME=phasma-${GITHUB_REF_NAME}-${{ matrix.target }}

          if [[ "${{ runner.os }}" == "Windows" ]]; then
            7z a $RELEASE_NAME.zip $BINARY ../../../configs/*
            certutil -hashfile $RELEASE_NAME.zip sha256 | grep -E '[A-Fa-f0-9]{64}' > $RELEASE_NAME.sha256
          else
            tar czvf $RELEASE_NAME.tar.gz $BINARY -C ../../.. configs/
            shasum -a 256 $RELEASE_NAME.tar.gz > $RELEASE_NAME.sha256
          fi

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/${{ matrix.target }}/release/phasma-*.tar.gz
            target/${{ matrix.target }}/release/phasma-*.zip
            target/${{ matrix.target }}/release/phasma-*.sha256

  publish-cargo:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
